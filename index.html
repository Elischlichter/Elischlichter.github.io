<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Games</title>
<style>
/* General Styles */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: url('Background.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    text-align: center;
}

h1 {
    color: #6eb220;
    font-size: 2rem;
    margin: 20px 0;
}

h2 {
    color: #fff;
    font-family: "Courier New", monospace;
    margin: 15px 0 10px;
}

p {
    color: #99b71e;
    font-size: 1rem;
}

a {
    color: #0fc9d7;
    text-decoration: none;
    font-size: 1rem;
    display: block;
    margin: 5px 0;
    transition: color 0.3s;
}

a:hover {
    color: #fff;
}

/* Tabs */
.tab {
    overflow: hidden;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.tab button {
    background: #444;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    border-radius: 5px;
    transition: background 0.3s;
}

.tab button.active,
.tab button:hover {
    background: #2196f3;
}

/* Game Icons */
.icon {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    transition: top 0.05s, left 0.05s;
}

#character { background: red; }
#blueIcon { background: rgb(0,102,255); }
#greenIcon { background: green; }
#tealIcon { background: rgb(28,238,238); }

/* Timer & Lives */
#timer, #lives {
    font-size: 2rem;
    margin: 10px;
    color: rgb(196,230,173);
}

/* Age sections hidden by default */
.age2, .age8, .age13 { display: none; }

/* Responsive input/button */
input, button {
    padding: 10px;
    margin: 10px 5px;
    font-size: 1rem;
    border-radius: 5px;
    border: none;
}

button:hover {
    background-color: #2196f3;
    color: #fff;
}

</style>
</head>
<body>

<!-- Tabs -->
<div class="tab">
    <button class="tablinks" id="defaultOpen" onclick="openTab(event,'Page1')">Page 1</button>
    <button class="tablinks" onclick="openTab(event,'Page2')">Page 2</button>
</div>

<!-- Page 1 -->
<div id="Page1" class="tab-content">
    <h1>Fun Games For Your Age</h1>
    <input id="agebox" type="number" placeholder="Enter age">
    <button onclick="checkAge()">Submit</button>
    <p>Select your age to see appropriate games!</p>

    <h2>Age 2-7</h2>
    <div class="age2">
        <a href="https://subwaysurf.io/play" target="_blank">Subway Surfers</a>
        <a href="https://snake.io/" target="_blank">Snake.io</a>
        <a href="https://kizi.com/games/going-balls" target="_blank">Going Balls</a>
        <a href="https://poki.com/" target="_blank">Poki</a>
        <a href="https://unblocked-minecraft.github.io/" target="_blank">Minecraft</a>
    </div>

    <h2>Age 8-12</h2>
    <div class="age8">
        <a href="https://supercell.com/en/games/brawlstars/" target="_blank">Brawl Stars</a>
        <a href="https://yoho2.top/" target="_blank">Yohoho.io</a>
        <a href="https://obiudon.easterndns.com/load.html?game=brawlguys" target="_blank">Art Class</a>
        <a href="https://vex-5.github.io/category/shooting.html" target="_blank">Vex 5</a>
        <a href="https://super-mario-64.gitlab.io/" target="_blank">Mario 64</a>
    </div>

    <h2>Age 13+</h2>
    <div class="age13">
        <a href="https://www.callofduty.com/" target="_blank">Call of Duty</a>
        <a href="https://theslope.github.io/" target="_blank">Slope</a>
        <a href="https://crossyroad-game.github.io/" target="_blank">Crossy Road</a>
        <a href="https://ubggo.github.io/ub-games/" target="_blank">UBGGO Games</a>
        <a href="https://idlestartuptycoon.gitlab.io/" target="_blank">Idle Startup</a>
    </div>
</div>

<!-- Page 2 -->
<div id="Page2" class="tab-content" style="position: relative; height: 80vh; overflow: hidden;">
    <h1>Press Start to Play</h1>

    <div id="character" class="icon" style="top:100px;left:100px"></div>
    <div id="greenIcon" class="icon" style="top:200px;left:1200px"></div>

    <div id="timer">Timer: 45</div>
    <div id="lives">Lives: 3</div>

    <button onclick="startGame()">Start</button>
</div>

<script>
// Tabs
function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content").forEach(tab => tab.style.display = "none");
    document.querySelectorAll(".tablinks").forEach(btn => btn.classList.remove("active"));
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}

document.getElementById("defaultOpen").click();

// Age checker
function checkAge() {
    let age = parseInt(document.getElementById("agebox").value);
    document.querySelectorAll(".age2,.age8,.age13").forEach(e => e.style.display = "none");

    if (age <= 7) document.querySelector(".age2").style.display = "block";
    else if (age <= 12) document.querySelector(".age8").style.display = "block";
    else document.querySelector(".age13").style.display = "block";
}

// Game logic
let character = document.getElementById("character");
let green = document.getElementById("greenIcon");

let redX = 100, redY = 100;
let greenX = 1200, greenY = 200;

let timer = 45, lives = 3;
let keys = {};
let gameInterval, timerInterval;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => delete keys[e.key]);

function startGame() {
    if (gameInterval) clearInterval(gameInterval);
    if (timerInterval) clearInterval(timerInterval);

    gameInterval = setInterval(gameLoop, 40);
    timerInterval = setInterval(() => {
        timer--;
        document.getElementById("timer").innerText = "Timer: " + timer;
        if (timer <= 0) { alert("Time's Up! Game Over."); location.reload(); }
    }, 1000);
}

function gameLoop() {
    const speed = 6;
    if (keys["ArrowUp"]) redY -= speed;
    if (keys["ArrowDown"]) redY += speed;
    if (keys["ArrowLeft"]) redX -= speed;
    if (keys["ArrowRight"]) redX += speed;

    // Keep character inside viewport
    redX = Math.max(0, Math.min(window.innerWidth - 50, redX));
    redY = Math.max(0, Math.min(window.innerHeight - 50, redY));

    character.style.left = redX + "px";
    character.style.top = redY + "px";

    // Green icon moves towards player
    let dx = redX - greenX;
    let dy = redY - greenY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist !== 0){
        greenX += (dx/dist) * 2;
        greenY += (dy/dist) * 2;
    }

    green.style.left = greenX + "px";
    green.style.top = greenY + "px";

    // Collision
    if(Math.abs(redX - greenX) < 40 && Math.abs(redY - greenY) < 40){
        lives--;
        document.getElementById("lives").innerText = "Lives: " + lives;

        greenX = Math.random() * (window.innerWidth - 50);
        greenY = Math.random() * (window.innerHeight - 50);

        if(lives <= 0){
            alert("You Lost!");
            location.reload();
        }
    }
}
</script>
</body>
</html>
